<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל טקסט עם זיכרון (Cookies)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        h1 {
            color: #333;
            min-height: 80px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body onload="checkCookie()">

    <div class="container">
        <h1 id="text-display">לחץ על הכפתור כדי להתחיל!</h1>
        <button onclick="changeText()">שנה טקסט</button>
    </div>

    <script>
        const sentences = [
            "היום הוא יום מצוין ללמוד משהו חדש!",
            "התמדה היא המפתח להצלחה.",
            "הקוד הזה עובד בזכותך!",
            "צריך תמיד להסתכל על חצי הכוס המלאה.",
            "כל מסע גדול מתחיל בצעד אחד קטן.",
            "פיצה היא תמיד רעיון טוב."
        ];

        // פונקציה לשינוי הטקסט ושמירתו ב-Cookie
        function changeText() {
            const textElement = document.getElementById('text-display');
            const randomIndex = Math.floor(Math.random() * sentences.length);
            const newText = sentences[randomIndex];

            textElement.innerText = newText;

            // שמירת המשפט בעוגייה למשך 30 יום
            setCookie("lastSentence", newText, 30);
        }

        // פונקציה ליצירת עוגייה
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            let expires = "expires=" + d.toUTCString();
            // encodeURIComponent מטפל בתווים בעברית בצורה תקינה
            document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/";
        }

        // פונקציה לקבלת ערך מעוגייה
        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }

        // פונקציה שמופעלת בטעינת הדף
        function checkCookie() {
            let lastSavedText = getCookie("lastSentence");
            if (lastSavedText != null) {
                document.getElementById('text-display').innerText = lastSavedText;
            }
        }
    </script>

</body>
</html>
