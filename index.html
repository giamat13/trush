<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>דף בדיקה</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        h1 {
            color: #333;
            min-height: 80px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="text-display">טוען...</h1>
        <button onclick="changeText()">שנה טקסט</button>
    </div>

    <script>
        const sentences = [
            "היום הוא יום מצוין ללמוד משהו חדש!",
            "התמדה היא המפתח להצלחה.",
            "הקוד הזה עובד בזכותך!",
            "צריך תמיד להסתכל על חצי הכוס המלאה.",
            "כל מסע גדול מתחיל בצעד אחד קטן.",
            "פיצה היא תמיד רעיון טוב."
        ];

        let lastIndex = -1;

        function getRandomText() {
            let index;
            do { index = Math.floor(Math.random() * sentences.length); }
            while (index === lastIndex);
            lastIndex = index;
            return sentences[index];
        }

        function changeText() {
            document.getElementById('text-display').innerText = getRandomText();
        }

        // טקסט רנדומלי חדש בכל טעינה
        changeText();
    </script>
</body>
</html>
